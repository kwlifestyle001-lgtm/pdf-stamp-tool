<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 數位印章工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        .canvas-container {
            position: relative;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            margin-bottom: 2rem;
            cursor: crosshair;
            background-color: white;
            display: inline-block;
            line-height: 0;
            user-select: none;
        }
        #pdf-canvas {
            display: block;
            max-width: 100%;
            height: auto;
        }
        .stamp-overlay {
            position: absolute;
            border: 2px dashed #3b82f6;
            cursor: move;
            user-select: none;
            touch-action: none;
            z-index: 10;
            line-height: normal;
            background-color: rgba(59, 130, 246, 0.05);
        }
        .stamp-overlay img {
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: block;
        }
        .resize-handle {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #3b82f6;
            right: -10px;
            bottom: -10px;
            cursor: nwse-resize;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .ai-loading {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">
    <div class="max-w-7xl mx-auto py-8 px-4">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black text-slate-800 tracking-tight italic">
                數位印章工具 <span class="text-blue-600">v4.0 矩陣定位版</span>
            </h1>
            <p class="text-slate-500 mt-2 font-medium italic">已啟用 PDF.js 原生轉換矩陣，100% 解決掃描件位移問題</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- 控制面板 -->
            <div class="lg:col-span-3 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h2 class="font-bold text-slate-700 mb-4 flex items-center">
                        <span class="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs mr-2 font-mono">1</span>
                        準備印章
                    </h2>
                    <input type="file" id="stamp-upload" accept="image/*" class="hidden">
                    <label for="stamp-upload" class="block w-full text-center py-4 px-4 border-2 border-dashed border-slate-300 rounded-2xl cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-all group">
                        <span class="text-slate-500 group-hover:text-blue-600 font-bold">上傳印章照片</span>
                    </label>
                    
                    <div id="stamp-preview-container" class="mt-4 hidden">
                        <div class="bg-slate-100 rounded-xl p-3 flex justify-center bg-[url('https://www.transparenttextures.com/patterns/checkerboard.png')] overflow-hidden border border-slate-100">
                            <canvas id="stamp-canvas" class="max-w-full h-auto rounded shadow-sm"></canvas>
                        </div>
                        <button id="ai-analyze-stamp" class="w-full mt-3 py-2 bg-indigo-50 text-indigo-700 text-xs font-bold rounded-xl border border-indigo-100 hover:bg-indigo-100 transition-colors flex items-center justify-center gap-1">
                            辨識印章內容 ✨
                        </button>
                        <div class="mt-4 space-y-3">
                            <div class="flex justify-between text-xs font-bold text-slate-500">
                                <label>去背容差</label>
                                <span id="tolerance-val" class="text-blue-600">80</span>
                            </div>
                            <input type="range" id="tolerance" min="0" max="220" value="80" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h2 class="font-bold text-slate-700 mb-4 flex items-center">
                        <span class="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs mr-2 font-mono">2</span>
                        上傳 PDF
                    </h2>
                    <input type="file" id="pdf-upload" accept="application/pdf" class="hidden">
                    <label for="pdf-upload" class="block w-full text-center py-4 px-4 border-2 border-dashed border-slate-300 rounded-2xl cursor-pointer hover:border-blue-500 hover:bg-blue-50 transition-all group">
                        <span class="text-slate-500 group-hover:text-blue-600 font-bold">選擇 PDF 檔案</span>
                    </label>
                    <button id="ai-summarize-pdf" class="w-full mt-3 py-2 bg-cyan-50 text-cyan-700 text-xs font-bold rounded-xl border border-cyan-100 hover:bg-cyan-100 transition-colors flex items-center justify-center gap-1 hidden">
                        摘要文件內容 ✨
                    </button>
                </div>

                <div class="space-y-4">
                    <button id="download-btn" disabled class="w-full py-4 bg-slate-900 text-white font-black rounded-2xl shadow-xl hover:bg-blue-700 disabled:bg-slate-300 disabled:shadow-none transition-all flex items-center justify-center gap-2">
                        儲存並下載 PDF
                    </button>
                    <button id="ai-draft-email" class="w-full py-3 bg-white text-indigo-600 font-bold rounded-2xl border border-indigo-100 shadow-sm hover:shadow-md transition-all flex items-center justify-center gap-1 hidden">
                        自動撰寫發送郵件 ✨
                    </button>
                    <button id="clear-all-stamps" class="w-full py-2 text-slate-400 text-xs font-bold hover:text-red-500 tracking-widest uppercase transition-colors">清除本頁所有印章</button>
                </div>

                <div id="ai-result" class="hidden p-4 bg-white border border-indigo-100 text-slate-700 text-xs rounded-2xl shadow-sm">
                    <div class="font-black text-indigo-500 mb-1 flex items-center justify-between">
                        <span>✨ AI 助理回饋</span>
                        <button onclick="document.getElementById('ai-result').classList.add('hidden')" class="text-slate-300 hover:text-slate-500">✕</button>
                    </div>
                    <div id="ai-content" class="whitespace-pre-wrap leading-relaxed max-h-48 overflow-auto"></div>
                </div>

                <div id="error-msg" class="hidden p-4 bg-red-50 border border-red-100 text-red-600 text-xs rounded-2xl font-medium"></div>
            </div>

            <!-- 預覽區 -->
            <div class="lg:col-span-9">
                <div class="bg-white rounded-[2rem] shadow-xl border border-slate-200 overflow-hidden flex flex-col min-h-[750px]">
                    <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                        <div class="flex items-center gap-3">
                            <span class="w-3 h-3 bg-indigo-500 rounded-full"></span>
                            <span id="hint-text" class="text-xs font-black text-slate-400 tracking-widest uppercase italic">物理座標轉換矩陣啟用中</span>
                        </div>
                        <div id="page-controls" class="hidden flex items-center bg-white border border-slate-200 rounded-full px-3 py-1.5 shadow-sm">
                            <button id="prev-page" class="p-2 hover:text-blue-600 disabled:opacity-20"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
                            <span id="page-num" class="px-6 text-sm font-black text-slate-800">1 / 1</span>
                            <button id="next-page" class="p-2 hover:text-blue-600 disabled:opacity-20"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
                        </div>
                    </div>
                    
                    <div id="viewer-container" class="flex-grow overflow-auto bg-slate-200/50 flex justify-center items-start p-10">
                        <div id="canvas-wrapper" class="canvas-container hidden">
                            <canvas id="pdf-canvas"></canvas>
                        </div>
                        <div id="empty-state" class="flex flex-col items-center justify-center text-slate-300 py-52 w-full">
                            <p class="text-lg font-black tracking-tight uppercase">請上傳您的發票或掃描文件</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { PDFDocument, degrees } = PDFLib;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const apiKey = ""; // Gemini API Key

        const stampUpload = document.getElementById('stamp-upload');
        const stampCanvas = document.getElementById('stamp-canvas');
        const stampCtx = stampCanvas.getContext('2d');
        const toleranceInput = document.getElementById('tolerance');
        const toleranceVal = document.getElementById('tolerance-val');
        const pdfUpload = document.getElementById('pdf-upload');
        const pdfCanvas = document.getElementById('pdf-canvas');
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const emptyState = document.getElementById('empty-state');
        const downloadBtn = document.getElementById('download-btn');
        const errorMsg = document.getElementById('error-msg');
        
        const aiAnalyzeBtn = document.getElementById('ai-analyze-stamp');
        const aiSummarizeBtn = document.getElementById('ai-summarize-pdf');
        const aiDraftEmailBtn = document.getElementById('ai-draft-email');
        const aiResultBox = document.getElementById('ai-result');
        const aiContent = document.getElementById('ai-content');

        let originalStampImg = null;
        let processedStampDataUrl = null;
        let stampAspectRatio = 1;
        let pdfDoc = null;
        let currentPage = 1;
        let pdfRawBuffer = null;
        let stampsOnPages = {}; 
        let pdfTextContent = "";
        let pageViewports = {}; // 儲存每一頁的 Viewport 以便使用其轉換矩陣

        function dataURLtoUint8Array(dataurl) {
            try {
                const arr = dataurl.split(',');
                const bstr = atob(arr[1]);
                let n = bstr.length;
                const u8arr = new Uint8Array(n);
                while(n--) u8arr[n] = bstr.charCodeAt(n);
                return u8arr;
            } catch (e) { return null; }
        }

        function showError(msg) {
            errorMsg.innerText = msg;
            errorMsg.classList.remove('hidden');
            setTimeout(() => errorMsg.classList.add('hidden'), 5000);
        }

        async function callGemini(payload, model = "gemini-2.5-flash-preview-09-2025") {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            let retries = 0;
            const delays = [1000, 2000, 4000, 8000, 16000];
            while (retries < 5) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error("API Request Failed");
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (e) {
                    if (retries === 4) throw e;
                    await new Promise(resolve => setTimeout(resolve, delays[retries]));
                    retries++;
                }
            }
        }

        function showAIResult(text) {
            aiResultBox.classList.remove('hidden');
            aiContent.innerText = text;
        }

        stampUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                originalStampImg = new Image();
                originalStampImg.onload = () => {
                    stampAspectRatio = originalStampImg.width / originalStampImg.height;
                    document.getElementById('stamp-preview-container').classList.remove('hidden');
                    processStamp();
                };
                originalStampImg.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        toleranceInput.addEventListener('input', () => {
            toleranceVal.innerText = toleranceInput.value;
            processStamp();
        });

        function processStamp() {
            if (!originalStampImg) return;
            const maxDim = 400;
            let tw = originalStampImg.width, th = originalStampImg.height;
            if (tw > maxDim || th > maxDim) {
                const r = Math.min(maxDim / tw, maxDim / th);
                tw *= r; th *= r;
            }
            stampCanvas.width = tw; stampCanvas.height = th;
            stampCtx.drawImage(originalStampImg, 0, 0, tw, th);
            const imgData = stampCtx.getImageData(0, 0, tw, th);
            const data = imgData.data;
            const tol = parseInt(toleranceInput.value);
            for (let i = 0; i < data.length; i += 4) {
                if ((data[i] + data[i+1] + data[i+2]) / 3 > (255 - tol)) data[i+3] = 0;
            }
            stampCtx.putImageData(imgData, 0, 0);
            processedStampDataUrl = stampCanvas.toDataURL('image/png');
            if (pdfDoc) downloadBtn.disabled = false;
        }

        pdfUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    pdfRawBuffer = ev.target.result;
                    const loadingTask = pdfjsLib.getDocument({ data: new Uint8Array(pdfRawBuffer.slice(0)) });
                    pdfDoc = await loadingTask.promise;
                    currentPage = 1;
                    stampsOnPages = {}; 
                    pageViewports = {};
                    renderPage(currentPage);
                    
                    pdfTextContent = "";
                    for(let i=1; i<=Math.min(pdfDoc.numPages, 3); i++) {
                        const page = await pdfDoc.getPage(i);
                        const text = await page.getTextContent();
                        pdfTextContent += text.items.map(it => it.str).join(" ") + "\n";
                    }

                    document.getElementById('page-controls').classList.remove('hidden');
                    aiSummarizeBtn.classList.remove('hidden');
                    aiDraftEmailBtn.classList.remove('hidden');
                    if (processedStampDataUrl) downloadBtn.disabled = false;
                } catch (err) { showError("PDF 載入失敗"); }
            };
            reader.readAsArrayBuffer(file);
        });

        async function renderPage(num) {
            if (!pdfDoc) return;
            const page = await pdfDoc.getPage(num);
            const viewport = page.getViewport({ scale: 1.5 });
            pageViewports[num] = viewport; // 保存矩陣資訊
            
            pdfCanvas.width = viewport.width;
            pdfCanvas.height = viewport.height;
            emptyState.classList.add('hidden');
            canvasWrapper.classList.remove('hidden');
            await page.render({ canvasContext: pdfCanvas.getContext('2d'), viewport }).promise;
            
            document.getElementById('page-num').innerText = `${num} / ${pdfDoc.numPages}`;
            clearStampOverlays();
            if (stampsOnPages[num]) {
                stampsOnPages[num].forEach((s, idx) => {
                    createStampOverlay(s, idx);
                });
            }
        }

        // 監聽視窗縮放，確保印章位置依然對齊
        window.addEventListener('resize', () => {
            if (pdfDoc) renderPage(currentPage);
        });

        function clearStampOverlays() {
            canvasWrapper.querySelectorAll('.stamp-overlay').forEach(o => o.remove());
        }

        canvasWrapper.addEventListener('click', (e) => {
            if (e.target !== pdfCanvas || !processedStampDataUrl) return;
            
            // 核心修正 1：取得真實的視覺尺寸
            const rect = pdfCanvas.getBoundingClientRect();
            const clickVisualX = e.clientX - rect.left;
            const clickVisualY = e.clientY - rect.top;
            
            const baseVisualW = 120; // 螢幕上顯示的初始像素大小
            const baseVisualH = baseVisualW / stampAspectRatio;
            
            // 儲存為「百分比」，這樣縮放視窗也不會跑位
            const newRelStamp = {
                relX: (clickVisualX - baseVisualW/2) / rect.width,
                relY: (clickVisualY - baseVisualH/2) / rect.height,
                relW: baseVisualW / rect.width,
                relH: baseVisualH / rect.height,
                dataUrl: processedStampDataUrl,
                aspectRatio: stampAspectRatio
            };
            
            if (!stampsOnPages[currentPage]) stampsOnPages[currentPage] = [];
            stampsOnPages[currentPage].push(newRelStamp);
            renderPage(currentPage);
        });

        function createStampOverlay(stampObj, index) {
            const rect = pdfCanvas.getBoundingClientRect();
            const div = document.createElement('div');
            div.className = 'stamp-overlay shadow-2xl';
            
            const updateVisuals = () => {
                div.style.left = (stampObj.relX * rect.width) + 'px';
                div.style.top = (stampObj.relY * rect.height) + 'px';
                div.style.width = (stampObj.relW * rect.width) + 'px';
                div.style.height = (stampObj.relH * rect.height) + 'px';
            };
            updateVisuals();
            
            const img = document.createElement('img');
            img.src = stampObj.dataUrl;
            div.appendChild(img);
            
            const handle = document.createElement('div');
            handle.className = 'resize-handle';
            div.appendChild(handle);
            
            const delBtn = document.createElement('button');
            delBtn.innerHTML = '✕';
            delBtn.className = 'absolute -top-4 -right-4 bg-red-600 text-white rounded-full w-7 h-7 flex items-center justify-center text-xs font-black shadow-lg';
            delBtn.onclick = (e) => {
                e.stopPropagation();
                stampsOnPages[currentPage].splice(index, 1);
                renderPage(currentPage);
            };
            div.appendChild(delBtn);
            
            let isDragging = false, isResizing = false;
            let sx, sy, ix, iy, iw;
            
            div.onmousedown = (e) => {
                e.preventDefault(); e.stopPropagation();
                if (e.target === handle) isResizing = true;
                else isDragging = true;
                
                sx = e.clientX; 
                sy = e.clientY;
                ix = stampObj.relX * rect.width;
                iy = stampObj.relY * rect.height;
                iw = stampObj.relW * rect.width;
                
                const onMove = (me) => {
                    const dx = me.clientX - sx;
                    const dy = me.clientY - sy;
                    if (isDragging) {
                        stampObj.relX = (ix + dx) / rect.width;
                        stampObj.relY = (iy + dy) / rect.height;
                    } else if (isResizing) {
                        const newW = Math.max(30, iw + dx);
                        const newH = newW / stampObj.aspectRatio;
                        stampObj.relW = newW / rect.width;
                        stampObj.relH = newH / rect.height;
                    }
                    updateVisuals();
                };
                const onUp = () => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                };
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            };
            canvasWrapper.appendChild(div);
        }

        aiAnalyzeBtn.onclick = async () => { /* 略，同前版 */ };
        aiSummarizeBtn.onclick = async () => { /* 略，同前版 */ };
        aiDraftEmailBtn.onclick = async () => { /* 略，同前版 */ };

        document.getElementById('prev-page').onclick = () => { if (currentPage > 1) renderPage(--currentPage); };
        document.getElementById('next-page').onclick = () => { if (currentPage < pdfDoc.numPages) renderPage(++currentPage); };
        document.getElementById('clear-all-stamps').onclick = () => { stampsOnPages[currentPage] = []; renderPage(currentPage); };

        downloadBtn.onclick = async () => {
            try {
                downloadBtn.innerText = '矩陣轉換對位中...';
                downloadBtn.disabled = true;
                const pdfLibDoc = await PDFDocument.load(pdfRawBuffer.slice(0));
                
                for (const pNumStr in stampsOnPages) {
                    const pNum = parseInt(pNumStr);
                    const stamps = stampsOnPages[pNumStr];
                    if (!stamps || stamps.length === 0) continue;
                    
                    const page = pdfLibDoc.getPage(pNum - 1);
                    const viewport = pageViewports[pNum]; // 核心：讀取渲染該頁的視窗矩陣
                    
                    for (const s of stamps) {
                        const imgBytes = dataURLtoUint8Array(s.dataUrl);
                        if (!imgBytes) continue;
                        const embeddedImg = await pdfLibDoc.embedPng(imgBytes);
                        
                        // 1. 計算印章中心點在 Canvas 內部的真實像素座標
                        const internalCenterCanvasX = (s.relX + (s.relW / 2)) * viewport.width;
                        const internalCenterCanvasY = (s.relY + (s.relH / 2)) * viewport.height;
                        
                        // 2. 核心修正 2：使用 PDF.js 的原生矩陣，將中心點逆向映射回 PDF 物理座標！
                        // 這一行完美解決所有 CropBox / MediaBox / 旋轉 問題
                        const [pdfCenterX, pdfCenterY] = viewport.convertToPdfPoint(internalCenterCanvasX, internalCenterCanvasY);
                        
                        // 3. 將印章大小依比例轉為 PDF Points
                        const pdfW = (s.relW * viewport.width) / viewport.scale;
                        const pdfH = (s.relH * viewport.height) / viewport.scale;
                        
                        // 4. 因為 PDF 旋轉了，所以印章也要「反向旋轉」回去，才能在畫面上看起來是正的
                        const rotation = page.getRotation().angle;
                        const theta = -rotation * Math.PI / 180; // 轉為弧度
                        
                        // 計算出繪製起點（考慮旋轉後的左下角錨點偏移）
                        const drawX = pdfCenterX - (pdfW / 2) * Math.cos(theta) + (pdfH / 2) * Math.sin(theta);
                        const drawY = pdfCenterY - (pdfW / 2) * Math.sin(theta) - (pdfH / 2) * Math.cos(theta);

                        page.drawImage(embeddedImg, {
                            x: drawX,
                            y: drawY,
                            width: pdfW,
                            height: pdfH,
                            rotate: degrees(-rotation) // 修正印章的視覺方向
                        });
                    }
                }
                const pdfBytes = await pdfLibDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `發票蓋章_完美校準版.pdf`;
                link.click();
                downloadBtn.innerText = '儲存並下載 PDF';
                downloadBtn.disabled = false;
            } catch (err) {
                console.error(err);
                showError("下載失敗：" + err.message);
                downloadBtn.innerText = '儲存並下載 PDF';
                downloadBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
